global:
  scrape_interval: 15s
  evaluation_interval: 15s
  
scrape_configs:
  - job_name: 'educonnect-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['educonnect-backend:8080']
    labels:
      instance: 'educonnect-backend:8080'
  - job_name: 'educonnect-frontend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['educonnect-frontend:3000']
    labels:
      instance: 'educonnect-frontend:3000'
    